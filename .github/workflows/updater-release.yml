# Automatically generate updater metadata from GitHub Releases for Tauri
name: Release with Updater Metadata

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: get version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: create or get release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `v${process.env.PACKAGE_VERSION}`;

            // Check if release already exists
            try {
              const { data: existingRelease } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });

              console.log(`Release already exists for ${tagName}, using existing release ID: ${existingRelease.id}`);
              return existingRelease.id;
            } catch (error) {
              if (error.status === 404) {
                // Release doesn't exist, create it as DRAFT
                console.log(`Release doesn't exist for ${tagName}, creating new DRAFT release...`);
                const { data } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: `Claude Code History Viewer v${process.env.PACKAGE_VERSION}`,
                  body: '🎉 A new version has been released! Check the detailed changes below.',
                  generate_release_notes: true,
                  draft: true,
                  prerelease: false,
                });
                console.log(`Created new DRAFT release with ID: ${data.id}`);
                return data.id;
              }

              // Re-throw if it's not a 404 error
              throw error;
            }

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: macos
          - platform: ubuntu-latest
            os: linux
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}


  generate-updater-metadata:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Query specific release by ID instead of 'latest' to prevent race conditions and improve stability.
      - name: Get specific release info by ID
        id: release
        run: |
          echo "📡 Fetching release information for ID: ${{ needs.create-release.outputs.release_id }}"

          RELEASE_INFO=$(curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }}")

          # Abort workflow if curl call fails or returns invalid JSON.
          if ! echo "$RELEASE_INFO" | jq . > /dev/null 2>&1; then
            echo "::error::Failed to fetch or parse release information from GitHub API."
            echo "Response was: $RELEASE_INFO"
            exit 1
          fi

          echo "✅ Successfully fetched release information"
          echo "🏷️ Release tag: $(echo "$RELEASE_INFO" | jq -r '.tag_name')"

          # Use heredoc syntax to safely set output and avoid shell quoting issues.
          echo "release_info<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate latest.json for Tauri updater
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { validateSignature, selectPlatformAssets, buildManifest } =
              require(`${process.env.GITHUB_WORKSPACE}/scripts/updater-manifest.cjs`);

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }}
            });
            const releaseData = release.data;
            const version = releaseData.tag_name.replace(/^v/, '');
            console.log(`Processing release version: ${version}`);

            // Pair each updater artifact (macOS uses .app.tar.gz, NOT .dmg) with
            // its exact .sig asset.
            const selected = selectPlatformAssets(releaseData.assets);
            const platforms = {};

            for (const [key, { asset, sigAsset }] of Object.entries(selected)) {
              if (!sigAsset) {
                core.setFailed(`No signature asset for ${key} (artifact ${asset.name})`);
                return;
              }
              // Download the .sig via the API with octet-stream. browser_download_url
              // returns a 404 "Not Found" body while the release is still a draft —
              // the authenticated asset endpoint returns the real bytes regardless.
              const sigRes = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: sigAsset.id,
                headers: { accept: 'application/octet-stream' }
              });
              const rawSig = Buffer.from(sigRes.data).toString('utf8');

              let signature;
              try {
                // The .sig file contents ARE the signature string — used verbatim,
                // never re-encoded. Throws (fails the build) if invalid.
                signature = validateSignature(rawSig, key);
              } catch (error) {
                core.setFailed(error.message);
                return;
              }

              platforms[key] = { signature, url: asset.browser_download_url };
              console.log(`${key}: ${asset.name} — signature ok (${signature.length} chars)`);
            }

            let manifest;
            try {
              manifest = buildManifest({
                version,
                notes: releaseData.body || '',
                pubDate: releaseData.published_at || new Date().toISOString(),
                platforms
              });
            } catch (error) {
              core.setFailed(error.message);
              return;
            }

            fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
            console.log('Generated latest.json:');
            console.log(JSON.stringify(manifest, null, 2));

      - name: Upload latest.json to release
        run: |
          gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [create-release, build-tauri, generate-updater-metadata]
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Publishing release...');
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
            console.log('✅ Release published successfully!');
